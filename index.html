<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App</title>
    <style>
        body { font-family: system-ui, sans-serif; display: grid; place-items: center; height: 100vh; margin: 0; background: #0f172a; color: white; }
        .card { padding: 2rem; background: #1e293b; border-radius: 12px; border: 1px solid #334155; text-align: center; }
        button { padding: 10px 20px; background: #38bdf8; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #0ea5e9; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Go + HTML Stack</h1>
        <p id="status">Status: Ready</p>
        <button onclick="checkApi()">Verify Connection</button>
    </div>

    <script>
        async function checkApi() {
            const status = document.getElementById('status');
            status.innerText = "Connecting...";
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                status.innerText = data.message;
            } catch (err) {
                status.innerText = "Error reaching backend";
            }
        }
    </script>
</body>
</html>
